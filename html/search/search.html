<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>LuxeStay | Search Hotels</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/search/search.css">
  <link rel="stylesheet" href="/css/nav/nav.css"> 
</head>
<body>
<div class="app-container">
  <div class="header">
    <button class="back-button" onclick="window.location.href='/html/nav/home.html'">
      <i class="fas fa-arrow-left"></i>
    </button>
    <div class="header-title">Search Your Destination</div>
  </div>

  <div class="search-form">
    <div class="search-field">
      <label><i class="fas fa-map-marker-alt"></i> Location</label>
      <div class="location-input">
        <i class="fas fa-search"></i>
        <input type="text" id="locationInput" placeholder="Where are you going? (City, hotel, or area)">
      </div>
    </div>

    <div class="date-row">
      <div class="date-field">
        <label><i class="fas fa-calendar-alt"></i> Check-In</label>
        <div class="date-input">
          <i class="fas fa-calendar-day"></i>
          <input type="date" id="checkInDate">
        </div>
      </div>
    </div>
    <div class="date-row">
      <div class="date-field">
        <label><i class="fas fa-calendar-alt"></i> Check-Out</label>
        <div class="date-input">
          <i class="fas fa-calendar-week"></i>
          <input type="date" id="checkOutDate">
        </div>
      </div>
    </div>

    <div class="room-field">
      <label><i class="fas fa-bed"></i> Room Type</label>
      <div class="room-select">
        <i class="fas fa-hotel"></i>
        <select id="roomSelect">
          <option value="">Select Room Type</option>
          <option value="standard">Standard Room</option>
          <option value="deluxe">Deluxe Room</option>
          <option value="suite">Suite</option>
          <option value="family">Family Room</option>
          <option value="presidential">Presidential Suite</option>
        </select>
      </div>
    </div>

    <div class="button-wrapper">
      <button class="search-button" id="searchDestinationBtn">
        <i class="fas fa-search"></i>
        <span>Search Your Destination</span>
      </button>
    </div>
  </div>

  <div id="nav-container"></div>
</div>

<script>
  // Get DOM elements
  const checkInInput = document.getElementById('checkInDate');
  const checkOutInput = document.getElementById('checkOutDate');
  const locationInput = document.getElementById('locationInput');
  const roomSelect = document.getElementById('roomSelect');
  const searchBtn = document.getElementById('searchDestinationBtn');

  // =====================================================
  // FUNCTION: Save search data to localStorage
  // =====================================================
  function saveSearchData() {
    const searchData = {
      location: locationInput.value.trim(),
      checkIn: checkInInput.value,
      checkOut: checkOutInput.value,
      roomType: roomSelect.value,
      roomTypeText: roomSelect.options[roomSelect.selectedIndex]?.text || ''
    };
    localStorage.setItem('searchFormData', JSON.stringify(searchData));
  }

  // =====================================================
  // FUNCTION: Load saved search data from localStorage
  // =====================================================
  function loadSavedSearchData() {
    const savedData = localStorage.getItem('searchFormData');
    if (savedData) {
      const searchData = JSON.parse(savedData);
      
      // Restore location
      if (searchData.location && locationInput) {
        locationInput.value = searchData.location;
      }
      
      // Restore check-in date
      if (searchData.checkIn && checkInInput) {
        checkInInput.value = searchData.checkIn;
      }
      
      // Restore check-out date
      if (searchData.checkOut && checkOutInput) {
        checkOutInput.value = searchData.checkOut;
      }
      
      // Restore room type
      if (searchData.roomType && roomSelect) {
        roomSelect.value = searchData.roomType;
      }
    }
  }

  // =====================================================
  // FUNCTION: Clear search form data (optional, called after search)
  // =====================================================
  function clearSearchData() {
    localStorage.removeItem('searchFormData');
  }

  // Set default dates with proper formatting
  const today = new Date();
  const tomorrow = new Date(today);
  tomorrow.setDate(tomorrow.getDate() + 1);
  
  // Format date to YYYY-MM-DD for input value
  function formatDate(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  }
  
  // Set default values ONLY if no saved data exists
  function setDefaultDates() {
    // Only set defaults if inputs are empty
    if (checkInInput && !checkInInput.value) {
      const defaultCheckIn = formatDate(today);
      checkInInput.value = defaultCheckIn;
      checkInInput.min = defaultCheckIn;
    }
    
    if (checkOutInput && !checkOutInput.value) {
      const defaultCheckOut = formatDate(tomorrow);
      checkOutInput.value = defaultCheckOut;
      checkOutInput.min = defaultCheckOut;
    }
  }

  // Load saved data first, then set defaults for any empty fields
  loadSavedSearchData();
  setDefaultDates();

  // Handle date validation and auto-update
  if (checkInInput && checkOutInput) {
    checkInInput.addEventListener('change', function() {
      const selectedCheckIn = new Date(this.value);
      const nextDay = new Date(selectedCheckIn);
      nextDay.setDate(selectedCheckIn.getDate() + 1);
      
      // Update min date for check-out
      checkOutInput.min = this.value;
      
      // If current check-out is before or equal to new check-in, update it
      if (checkOutInput.value <= this.value) {
        checkOutInput.value = formatDate(nextDay);
      }
      
      // Save data when changed
      saveSearchData();
    });
    
    // Validate on page load
    checkOutInput.addEventListener('change', function() {
      if (checkInInput.value && this.value <= checkInInput.value) {
        const nextDay = new Date(checkInInput.value);
        nextDay.setDate(nextDay.getDate() + 1);
        this.value = formatDate(nextDay);
        alert('Check-out date must be after check-in date. It has been adjusted.');
      }
      // Save data when changed
      saveSearchData();
    });
  }

  // Save data when typing in location
  if (locationInput) {
    locationInput.addEventListener('input', function() {
      saveSearchData();
    });
  }

  // Save data when room type changes
  if (roomSelect) {
    roomSelect.addEventListener('change', function() {
      saveSearchData();
    });
  }

  // Function to show error message
  function showError(inputId, message) {
    const inputElement = document.getElementById(inputId);
    if (inputElement) {
      // Find the parent field container
      let container = inputElement.closest('.search-field, .date-field, .room-field');
      if (container) {
        container.classList.add('error');
        
        // Remove existing error message if any
        const existingError = container.querySelector('.error-message');
        if (existingError) {
          existingError.remove();
        }
        
        // Create new error message
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-message';
        errorDiv.textContent = message;
        container.appendChild(errorDiv);
        
        // Add red border to input/select container
        const inputContainer = container.querySelector('.location-input, .date-input, .room-select');
        if (inputContainer) {
          inputContainer.style.borderColor = '#e74c3c';
        }
      }
    }
  }
  
  // Function to clear all error messages
  function clearErrors() {
    const errorContainers = document.querySelectorAll('.search-field, .date-field, .room-field');
    errorContainers.forEach(container => {
      container.classList.remove('error');
      const errorMsg = container.querySelector('.error-message');
      if (errorMsg) {
        errorMsg.remove();
      }
      const inputContainer = container.querySelector('.location-input, .date-input, .room-select');
      if (inputContainer) {
        inputContainer.style.borderColor = '';
      }
    });
  }
  
  // Validation and search function
  function validateAndSearch() {
    // Get values
    const location = locationInput.value.trim();
    const checkIn = checkInInput.value;
    const checkOut = checkOutInput.value;
    const roomType = roomSelect.value;
    const roomTypeText = roomSelect.options[roomSelect.selectedIndex]?.text || '';
    
    // Clear previous error messages
    clearErrors();
    
    let isValid = true;
    
    // Validate Location
    if (!location) {
      showError('locationInput', 'Please enter a destination');
      isValid = false;
    } else if (location.length < 2) {
      showError('locationInput', 'Please enter a valid destination (at least 2 characters)');
      isValid = false;
    }
    
    // Validate Check-In Date
    if (!checkIn) {
      showError('checkInDate', 'Please select check-in date');
      isValid = false;
    }
    
    // Validate Check-Out Date
    if (!checkOut) {
      showError('checkOutDate', 'Please select check-out date');
      isValid = false;
    }
    
    // Validate that check-out is after check-in
    if (checkIn && checkOut && checkOut <= checkIn) {
      showError('checkOutDate', 'Check-out date must be after check-in date');
      isValid = false;
    }
    
    // Validate Room Type
    if (!roomType) {
      showError('roomSelect', 'Please select a room type');
      isValid = false;
    }
    
    // If all validations pass, proceed to search results
    if (isValid) {
      // Format dates for display (DD MMM YYYY format)
      function formatDisplayDate(dateString) {
        const date = new Date(dateString);
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
      }
      
      // Store search parameters in localStorage to use in results page
      const searchParams = {
        location: location,
        checkIn: checkIn,
        checkOut: checkOut,
        checkInDisplay: formatDisplayDate(checkIn),
        checkOutDisplay: formatDisplayDate(checkOut),
        roomType: roomTypeText,
        roomTypeValue: roomType,
        adults: 2,
        rooms: 1
      };
      
      localStorage.setItem('searchParams', JSON.stringify(searchParams));
      
      // IMPORTANT: Keep the form data saved so when user clicks back, it's still there
      // Do NOT clear the searchFormData here - this preserves the input when going back
      // saveSearchData() is already called on every input change, so data is already saved
      
      // Navigate to search results page
      window.location.href = '/html/search/result.html';
    }
  }
  
  // Add real-time validation clearing on input
  if (locationInput) {
    locationInput.addEventListener('input', function() {
      const container = this.closest('.search-field');
      if (container && container.classList.contains('error')) {
        container.classList.remove('error');
        const errorMsg = container.querySelector('.error-message');
        if (errorMsg) errorMsg.remove();
        const inputContainer = container.querySelector('.location-input');
        if (inputContainer) inputContainer.style.borderColor = '';
      }
    });
  }
  
  if (checkInInput) {
    checkInInput.addEventListener('change', function() {
      const container = this.closest('.date-field');
      if (container && container.classList.contains('error')) {
        container.classList.remove('error');
        const errorMsg = container.querySelector('.error-message');
        if (errorMsg) errorMsg.remove();
        const inputContainer = container.querySelector('.date-input');
        if (inputContainer) inputContainer.style.borderColor = '';
      }
    });
  }
  
  if (checkOutInput) {
    checkOutInput.addEventListener('change', function() {
      const container = this.closest('.date-field');
      if (container && container.classList.contains('error')) {
        container.classList.remove('error');
        const errorMsg = container.querySelector('.error-message');
        if (errorMsg) errorMsg.remove();
        const inputContainer = container.querySelector('.date-input');
        if (inputContainer) inputContainer.style.borderColor = '';
      }
    });
  }
  
  if (roomSelect) {
    roomSelect.addEventListener('change', function() {
      const container = this.closest('.room-field');
      if (container && container.classList.contains('error')) {
        container.classList.remove('error');
        const errorMsg = container.querySelector('.error-message');
        if (errorMsg) errorMsg.remove();
        const inputContainer = container.querySelector('.room-select');
        if (inputContainer) inputContainer.style.borderColor = '';
      }
    });
  }
  
  // Attach search button click event
  if (searchBtn) {
    searchBtn.addEventListener('click', validateAndSearch);
  }
  
  // Also allow Enter key to trigger search
  if (locationInput) {
    locationInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        validateAndSearch();
      }
    });
  }
  
  // Load navigation component from external file
  fetch('nav.html')
    .then(response => {
      if (!response.ok) {
        throw new Error('Navigation file not found');
      }
      return response.text();
    })
    .then(html => {
      document.getElementById('nav-container').innerHTML = html;
      
      // After loading nav, set active state
      const currentPage = window.location.pathname.split('/').pop() || 'search.html';
      const navItems = document.querySelectorAll('.nav-item');
      
      navItems.forEach(item => {
        const href = item.getAttribute('href');
        if (href && (href.includes(currentPage) || href.endsWith(currentPage))) {
          item.classList.add('active');
        }
      });
    })
    .catch(error => {
      console.error('Error loading navigation:', error);
      // Fallback navigation
      document.getElementById('nav-container').innerHTML = `
        <div class="bottom-nav">
          <div class="nav-buttons">
            <a href="../nav/home.html" class="nav-item">
              <i class="fas fa-home"></i>
              <span>Home</span>
            </a>
            <a href="../nav/history.html" class="nav-item">
              <i class="fas fa-clock-rotate-left"></i>
              <span>History</span>
            </a>
            <a href="../nav/profile.html" class="nav-item">
              <i class="fas fa-user-circle"></i>
              <span>Profile</span>
            </a>
            <a href="../nav/cs.html" class="nav-item">
              <i class="fas fa-headset"></i>
              <span>Service</span>
            </a>
          </div>
        </div>
      `;
      
      // Set active state for fallback
      const currentPage = window.location.pathname.split('/').pop() || 'search.html';
      const navItems = document.querySelectorAll('.nav-item');
      navItems.forEach(item => {
        const href = item.getAttribute('href');
        if (href && (href.includes(currentPage) || href.endsWith(currentPage))) {
          item.classList.add('active');
        }
      });
    });
</script>
</body>
</html>
