<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>LuxeStay | Search Results</title>
  <!-- Font Awesome 6 (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/search/result.css">
  <link rel="stylesheet" href="/css/nav/nav.css">
  
  <!-- Include external hotel database -->
  <script src="../hotel/hotel.js"></script>
  
  <!-- Debug script to verify database loaded -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof HOTELS_DATABASE === 'undefined') {
        console.error('ERROR: HOTELS_DATABASE not loaded!');
      } else {
        console.log('SUCCESS: Database loaded with ' + Object.keys(HOTELS_DATABASE).length + ' hotels');
      }
    });
  </script>
</head>
<body>
<div class="app-container">
  <div class="header">
    <button class="back-button" onclick="window.location.href='search.html'">
      <i class="fas fa-arrow-left"></i>
    </button>
    <div class="header-title">Search Result</div>
  </div>

  <div class="search-section">
    <div class="search-bar-card" onclick="window.location.href='search.html'">
      <i class="fas fa-search"></i>
      <div class="search-text">
        <span class="main-text" id="searchLocationDisplay">Loading...</span>
        <span class="sub-text" id="searchDateDisplay">Loading...</span>
      </div>
    </div>
  </div>

  <div class="results-info">
    <div class="results-count" id="resultsCountDisplay">Loading hotels...</div>
  </div>

  <div class="hotel-list" id="hotelListContainer"></div>

  <div id="nav-container"></div>
</div>

<script>
  // Room type occupancy mapping - follows user selection
  const ROOM_OCCUPANCY = {
    standard: { adults: 2, children: 0, display: "2 Adults" },
    deluxe: { adults: 2, children: 1, display: "2 Adults + 1 Child" },
    suite: { adults: 2, children: 2, display: "2 Adults + 2 Children" },
    family: { adults: 4, children: 2, display: "4 Adults + 2 Children" },
    presidential: { adults: 4, children: 2, display: "4 Adults + 2 Children" }
  };

  function getOccupancyDisplay(roomTypeValue) {
    return ROOM_OCCUPANCY[roomTypeValue]?.display || "2 Adults";
  }

  function getGuestText(roomTypeValue) {
    const occupancy = ROOM_OCCUPANCY[roomTypeValue];
    if (!occupancy) return "2 Adults · 1 Room";
    
    let guestText = `${occupancy.adults} Adult${occupancy.adults > 1 ? 's' : ''}`;
    if (occupancy.children > 0) {
      guestText += `, ${occupancy.children} Child${occupancy.children > 1 ? 'ren' : ''}`;
    }
    guestText += ` · 1 Room`;
    return guestText;
  }

  // Get the specific room by type value from hotel's rooms
  function getRoomByTypeValue(rooms, roomTypeValue) {
    return rooms.find(room => room.typeValue === roomTypeValue);
  }

  // Convert HOTELS_DATABASE to ALL_HOTELS array
  function convertToAllHotels() {
    const allHotels = [];
    
    for (const id in HOTELS_DATABASE) {
      const hotel = HOTELS_DATABASE[id];
      
      const keywords = [
        hotel.name.toLowerCase(),
        hotel.location.toLowerCase(),
        ...hotel.amenities.map(a => a.toLowerCase()),
        ...hotel.facilities.map(f => f.toLowerCase())
      ];
      
      const locationWords = hotel.location.toLowerCase().split(' ');
      locationWords.forEach(word => {
        if (word.length > 2) keywords.push(word);
      });
      
      const nameWords = hotel.name.toLowerCase().split(' ');
      nameWords.forEach(word => {
        if (word.length > 2) keywords.push(word);
      });
      
      const locationLower = hotel.location.toLowerCase();
      if (locationLower.includes('pahang')) keywords.push('phg', 'pah');
      if (locationLower.includes('kuala lumpur') || locationLower.includes('klcc') || locationLower.includes('bukit bintang')) {
        keywords.push('kl', 'klcc');
      }
      if (locationLower.includes('langkawi')) keywords.push('lgk', 'lang');
      if (locationLower.includes('penang')) keywords.push('pn', 'pen');
      if (locationLower.includes('johor')) keywords.push('jb', 'jhr');
      if (locationLower.includes('malacca') || locationLower.includes('melaka')) keywords.push('mlk', 'melaka');
      if (locationLower.includes('kedah')) keywords.push('ked', 'kdh');
      if (locationLower.includes('kuantan')) keywords.push('ktn');
      
      allHotels.push({
        id: hotel.id,
        name: hotel.name,
        rating: hotel.rating,
        location: hotel.location,
        amenities: hotel.amenities,
        image: hotel.image,
        keywords: [...new Set(keywords)],
        allRooms: hotel.rooms
      });
    }
    
    return allHotels;
  }

  function getSearchParams() {
    const params = localStorage.getItem('searchParams');
    if (params) {
      return JSON.parse(params);
    }
    return null;
  }

  function displaySearchInfo(searchParams) {
    if (searchParams) {
      const locationDisplay = document.getElementById('searchLocationDisplay');
      if (locationDisplay) {
        locationDisplay.textContent = searchParams.location;
      }
      
      const dateDisplay = document.getElementById('searchDateDisplay');
      if (dateDisplay) {
        const checkIn = searchParams.checkInDisplay || formatDateForDisplay(searchParams.checkIn);
        const checkOut = searchParams.checkOutDisplay || formatDateForDisplay(searchParams.checkOut);
        const roomTypeValue = searchParams.roomTypeValue || 'standard';
        const guestText = getGuestText(roomTypeValue);
        dateDisplay.textContent = `${checkIn} - ${checkOut} · ${guestText}`;
      }
    } else {
      const locationDisplay = document.getElementById('searchLocationDisplay');
      if (locationDisplay) {
        locationDisplay.textContent = "Kuala Lumpur City Centre";
      }
      
      const dateDisplay = document.getElementById('searchDateDisplay');
      if (dateDisplay) {
        dateDisplay.textContent = "15 Apr 2026 - 18 Apr 2026 · 2 Adults · 1 Room";
      }
    }
  }

  function formatDateForDisplay(dateString) {
    if (!dateString) return '';
    const date = new Date(dateString);
    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
  }

  function searchHotels(searchLocation, allHotels) {
    if (!searchLocation) return [];
    
    const searchTerm = searchLocation.toLowerCase().trim();
    const searchWords = searchTerm.split(' ');
    
    const abbreviationMap = {
      'kl': 'kuala lumpur', 'klcc': 'kuala lumpur', 'phg': 'pahang', 'pah': 'pahang',
      'lgk': 'langkawi', 'lang': 'langkawi', 'pn': 'penang', 'pen': 'penang',
      'jb': 'johor', 'jhr': 'johor', 'mlk': 'malacca', 'melaka': 'malacca',
      'ked': 'kedah', 'kdh': 'kedah', 'ktn': 'kuantan'
    };
    
    let expandedSearchTerm = searchTerm;
    let expandedWords = [];
    
    if (abbreviationMap[searchTerm]) {
      expandedSearchTerm = abbreviationMap[searchTerm];
      expandedWords = expandedSearchTerm.split(' ');
    }
    
    return allHotels.filter(hotel => {
      const hotelLocation = hotel.location.toLowerCase();
      const hotelName = hotel.name.toLowerCase();
      
      const locationMatch = hotelLocation.includes(expandedSearchTerm) || hotelLocation.includes(searchTerm);
      const nameMatch = hotelName.includes(expandedSearchTerm) || hotelName.includes(searchTerm);
      
      const keywordMatch = hotel.keywords.some(keyword => 
        expandedSearchTerm.includes(keyword) || keyword.includes(expandedSearchTerm) ||
        searchTerm.includes(keyword) || keyword.includes(searchTerm)
      );
      
      let wordMatch = false;
      const wordsToCheck = [...new Set([...searchWords, ...expandedWords])];
      for (const word of wordsToCheck) {
        if (word.length > 1) {
          if (hotelLocation.includes(word) || hotelName.includes(word) ||
              hotel.keywords.some(k => k.includes(word))) {
            wordMatch = true;
            break;
          }
        }
      }
      
      const isKL = searchTerm === 'kl' || searchTerm.includes('kl ');
      const hasKL = hotelLocation.includes('kuala lumpur') || hotelLocation.includes('klcc') ||
                    hotelName.includes('kuala lumpur');
      
      return locationMatch || keywordMatch || nameMatch || wordMatch || (isKL && hasKL);
    });
  }

  function updateResultsCount(count, searchLocation) {
    const countDisplay = document.getElementById('resultsCountDisplay');
    if (countDisplay) {
      if (count === 0) {
        countDisplay.innerHTML = `<span>0 hotels</span> found for "${searchLocation}"`;
      } else if (count === 1) {
        countDisplay.innerHTML = `<span>1 hotel</span> found for your search`;
      } else {
        countDisplay.innerHTML = `<span>${count} hotels</span> found for your search`;
      }
    }
  }

  function renderHotels(hotels, selectedRoomTypeValue) {
    const container = document.getElementById('hotelListContainer');
    
    if (!container) return;
    
    if (hotels.length === 0) {
      container.innerHTML = `
        <div style="text-align: center; padding: 60px 20px; color: #666;">
          <i class="fas fa-hotel" style="font-size: 64px; color: #ccc; margin-bottom: 20px; display: block;"></i>
          <h3 style="margin-bottom: 10px;">No hotels found</h3>
          <p>We couldn't find any hotels matching your search.<br>Try searching for a different location or check your spelling.</p>
        </div>
      `;
      return;
    }
    
    let hotelsHTML = '';
    
    hotels.forEach(hotel => {
      // Get the specific room based on user's selected room type
      let displayRoom = getRoomByTypeValue(hotel.allRooms, selectedRoomTypeValue);
      let occupancyDisplay = getOccupancyDisplay(selectedRoomTypeValue);
      
      // If the hotel doesn't have the exact room type, use first available room
      if (!displayRoom && hotel.allRooms.length > 0) {
        displayRoom = hotel.allRooms[0];
        occupancyDisplay = getOccupancyDisplay(displayRoom.typeValue);
      }
      
      // Generate amenities HTML
      let amenitiesHTML = '';
      hotel.amenities.forEach(amenity => {
        let icon = 'fa-hotel';
        if (amenity.includes('Pool')) icon = 'fa-swimming-pool';
        else if (amenity.includes('WiFi')) icon = 'fa-wifi';
        else if (amenity.includes('Restaurant')) icon = 'fa-utensils';
        else if (amenity.includes('Bar')) icon = 'fa-cocktail';
        else if (amenity.includes('Service')) icon = 'fa-concierge-bell';
        else if (amenity.includes('Centre') || amenity.includes('Spa')) icon = 'fa-spa';
        else if (amenity.includes('Fitness')) icon = 'fa-dumbbell';
        else if (amenity.includes('Beach')) icon = 'fa-umbrella-beach';
        else if (amenity.includes('View')) icon = 'fa-leaf';
        
        amenitiesHTML += `<span><i class="fas ${icon}"></i> ${amenity}</span>`;
      });
      
      hotelsHTML += `
        <a href="../hotel/hotel.html?id=${hotel.id}" style="text-decoration: none; color: inherit;">
          <div class="hotel-card">
            <div class="hotel-image">
              <img src="${hotel.image}" alt="${hotel.name}">
            </div>
            <div class="hotel-info">
              <div class="hotel-name">
                ${hotel.name}
                <span>⭐ ${hotel.rating}</span>
              </div>
              <div class="hotel-details">
                <span><i class="fas fa-map-marker-alt"></i> ${hotel.location}</span>
                ${amenitiesHTML}
              </div>
              <div class="price">
                RM ${displayRoom.price.toLocaleString()} <small>/ night</small>
                <span style="margin-left: 10px; font-size: 12px; font-weight: normal; color: #6c7e8e;">
                  <i class="fas fa-user-friends"></i> ${occupancyDisplay}
                </span>
              </div>
            </div>
          </div>
        </a>
      `;
    });
    
    container.innerHTML = hotelsHTML;
  }

  // =====================================================
  // MAIN FUNCTION: Initialize page with search results
  // =====================================================
  function initializeResults() {
    if (typeof HOTELS_DATABASE === 'undefined') {
      console.error('HOTELS_DATABASE not loaded!');
      document.getElementById('resultsCountDisplay').innerHTML = '<span>Error</span> Database not loaded';
      return;
    }
    
    const ALL_HOTELS = convertToAllHotels();
    const searchParams = getSearchParams();
    
    if (searchParams) {
      displaySearchInfo(searchParams);
      
      const searchLocation = searchParams.location;
      const selectedRoomTypeValue = searchParams.roomTypeValue || 'standard';
      
      console.log('Searching for: "' + searchLocation + '"');
      console.log('Selected Room Type: ' + selectedRoomTypeValue);
      
      const matchingHotels = searchHotels(searchLocation, ALL_HOTELS);
      
      console.log('Found ' + matchingHotels.length + ' matching hotels');
      
      updateResultsCount(matchingHotels.length, searchLocation);
      renderHotels(matchingHotels, selectedRoomTypeValue);
      
      // Save search params for hotel page to use
      localStorage.setItem('searchParamsForHotel', JSON.stringify({
        roomTypeValue: selectedRoomTypeValue,
        roomTypeName: searchParams.roomType || 'Standard Room',
        checkIn: searchParams.checkIn,
        checkOut: searchParams.checkOut,
        adults: ROOM_OCCUPANCY[selectedRoomTypeValue]?.adults || 2,
        children: ROOM_OCCUPANCY[selectedRoomTypeValue]?.children || 0,
        rooms: 1
      }));
      
    } else {
      console.log('No search parameters found, using default');
      
      const defaultLocation = "Kuala Lumpur City Centre";
      const defaultRoomTypeValue = "standard";
      
      const locationDisplay = document.getElementById('searchLocationDisplay');
      if (locationDisplay) {
        locationDisplay.textContent = defaultLocation;
      }
      
      const dateDisplay = document.getElementById('searchDateDisplay');
      if (dateDisplay) {
        dateDisplay.textContent = "15 Apr 2026 - 18 Apr 2026 · 2 Adults · 1 Room";
      }
      
      const defaultHotels = searchHotels(defaultLocation, ALL_HOTELS);
      
      updateResultsCount(defaultHotels.length, defaultLocation);
      renderHotels(defaultHotels, defaultRoomTypeValue);
    }
  }

  // =====================================================
  // LOAD NAVIGATION AND INITIALIZE PAGE
  // =====================================================
  
  fetch('nav.html')
    .then(response => {
      if (!response.ok) {
        throw new Error('Navigation file not found');
      }
      return response.text();
    })
    .then(html => {
      document.getElementById('nav-container').innerHTML = html;
      
      const currentPage = window.location.pathname.split('/').pop() || 'result.html';
      const navItems = document.querySelectorAll('.nav-item');
      
      navItems.forEach(item => {
        const href = item.getAttribute('href');
        if (href && (href === currentPage || (currentPage === 'result.html' && href === 'result.html'))) {
          item.classList.add('active');
        }
      });
      
      initializeResults();
    })
    .catch(error => {
      console.error('Error loading navigation:', error);
      document.getElementById('nav-container').innerHTML = `
        <div class="bottom-nav">
          <div class="nav-buttons">
            <a href="../nav/home.html" class="nav-item">
              <i class="fas fa-home"></i>
              <span>Home</span>
            </a>
            <a href="../nav/history.html" class="nav-item">
              <i class="fas fa-clock-rotate-left"></i>
              <span>History</span>
            </a>
            <a href="../nav/profile.html" class="nav-item">
              <i class="fas fa-user-circle"></i>
              <span>Profile</span>
            </a>
            <a href="../nav/cs.html" class="nav-item">
              <i class="fas fa-headset"></i>
              <span>Service</span>
            </a>
          </div>
        </div>
      `;
      
      initializeResults();
    });
</script>
</body>
</html>
