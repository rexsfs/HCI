<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>LuxeStay | Search Hotels</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/search/search.css">
  <link rel="stylesheet" href="/css/nav/nav.css"> 
</head>
<body>
<div class="app-container">
  <div class="header">
    <button class="back-button" onclick="goBackToHome()">
      <i class="fas fa-arrow-left"></i>
    </button>
    <div class="header-title">Select Your Dates</div>
  </div>

  <div class="search-form">
    <div class="date-row">
      <div class="date-field">
        <label><i class="fas fa-calendar-alt"></i> Check-In</label>
        <div class="date-input">
          <i class="fas fa-calendar-day"></i>
          <input type="date" id="checkInDate">
        </div>
      </div>
    </div>
    
    <div class="date-row">
      <div class="date-field">
        <label><i class="fas fa-calendar-alt"></i> Check-Out</label>
        <div class="date-input">
          <i class="fas fa-calendar-week"></i>
          <input type="date" id="checkOutDate">
        </div>
      </div>
    </div>

    <div class="button-wrapper">
      <button class="search-button" id="searchDestinationBtn">
        <i class="fas fa-calendar-check"></i>
        <span>View Hotels</span>
      </button>
    </div>
  </div>

  <div id="nav-container"></div>
</div>

<script>
  // Get DOM elements
  const checkInInput = document.getElementById('checkInDate');
  const checkOutInput = document.getElementById('checkOutDate');
  const searchBtn = document.getElementById('searchDestinationBtn');

  // =====================================================
  // FUNCTION: Check if coming from home page
  // =====================================================
  function isComingFromHome() {
    const referrer = document.referrer;
    if (referrer && (referrer.includes('home.html') || referrer.includes('/nav/home.html'))) {
      return true;
    }
    const fromHome = sessionStorage.getItem('fromHome');
    if (fromHome === 'true') {
      sessionStorage.removeItem('fromHome');
      return true;
    }
    return false;
  }

  // =====================================================
  // FUNCTION: Reset form to default values
  // =====================================================
  function resetToDefault() {
    console.log('Resetting form to default values');
    
    const today = new Date();
    const tomorrow = new Date(today);
    tomorrow.setDate(tomorrow.getDate() + 1);
    
    if (checkInInput) {
      const defaultCheckIn = formatDate(today);
      checkInInput.value = defaultCheckIn;
      checkInInput.min = defaultCheckIn;
    }
    
    if (checkOutInput) {
      const defaultCheckOut = formatDate(tomorrow);
      checkOutInput.value = defaultCheckOut;
      checkOutInput.min = defaultCheckOut;
    }
    
    localStorage.removeItem('searchFormData');
  }

  // =====================================================
  // FUNCTION: Save search data to localStorage
  // =====================================================
  function saveSearchData() {
    if (isComingFromHome()) {
      return;
    }
    
    const searchData = {
      checkIn: checkInInput.value,
      checkOut: checkOutInput.value
    };
    localStorage.setItem('searchFormData', JSON.stringify(searchData));
  }

  // =====================================================
  // FUNCTION: Load saved search data from localStorage
  // =====================================================
  function loadSavedSearchData() {
    if (isComingFromHome()) {
      resetToDefault();
      return;
    }
    
    const savedData = localStorage.getItem('searchFormData');
    if (savedData) {
      const searchData = JSON.parse(savedData);
      
      if (searchData.checkIn && checkInInput) {
        checkInInput.value = searchData.checkIn;
      }
      
      if (searchData.checkOut && checkOutInput) {
        checkOutInput.value = searchData.checkOut;
      }
    } else {
      setDefaultDates();
    }
  }

  // Format date to YYYY-MM-DD for input value
  function formatDate(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  }
  
  // Set default dates
  function setDefaultDates() {
    const today = new Date();
    const tomorrow = new Date(today);
    tomorrow.setDate(tomorrow.getDate() + 1);
    
    if (checkInInput && !checkInInput.value) {
      const defaultCheckIn = formatDate(today);
      checkInInput.value = defaultCheckIn;
      checkInInput.min = defaultCheckIn;
    }
    
    if (checkOutInput && !checkOutInput.value) {
      const defaultCheckOut = formatDate(tomorrow);
      checkOutInput.value = defaultCheckOut;
      checkOutInput.min = defaultCheckOut;
    }
  }

  // =====================================================
  // FUNCTION: Go back to home
  // =====================================================
  function goBackToHome() {
    localStorage.removeItem('selectedHotelId');
    sessionStorage.setItem('fromHome', 'true');
    window.location.href = '/html/nav/home.html';
  }

  // Calculate nights between dates
  function calculateNights(checkIn, checkOut) {
    if (!checkIn || !checkOut) return 0;
    const start = new Date(checkIn);
    const end = new Date(checkOut);
    const diffTime = Math.abs(end - start);
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    return diffDays;
  }

  // Initialize page
  function initializePage() {
    loadSavedSearchData();
    setupEventListeners();
  }

  // Set up event listeners for saving data
  function setupEventListeners() {
    if (checkInInput && checkOutInput) {
      checkInInput.addEventListener('change', function() {
        const selectedCheckIn = new Date(this.value);
        const nextDay = new Date(selectedCheckIn);
        nextDay.setDate(selectedCheckIn.getDate() + 1);
        
        checkOutInput.min = this.value;
        
        if (checkOutInput.value <= this.value) {
          checkOutInput.value = formatDate(nextDay);
        }
        
        saveSearchData();
      });
      
      checkOutInput.addEventListener('change', function() {
        if (checkInInput.value && this.value <= checkInInput.value) {
          const nextDay = new Date(checkInInput.value);
          nextDay.setDate(nextDay.getDate() + 1);
          this.value = formatDate(nextDay);
          alert('Check-out date must be after check-in date. It has been adjusted.');
        }
        saveSearchData();
      });
    }
  }

  // Function to show error message
  function showError(inputId, message) {
    const inputElement = document.getElementById(inputId);
    if (inputElement) {
      let container = inputElement.closest('.date-field');
      if (container) {
        container.classList.add('error');
        
        const existingError = container.querySelector('.error-message');
        if (existingError) {
          existingError.remove();
        }
        
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-message';
        errorDiv.textContent = message;
        container.appendChild(errorDiv);
        
        const inputContainer = container.querySelector('.date-input');
        if (inputContainer) {
          inputContainer.style.borderColor = '#e74c3c';
        }
      }
    }
  }
  
  // Function to clear all error messages
  function clearErrors() {
    const errorContainers = document.querySelectorAll('.date-field');
    errorContainers.forEach(container => {
      container.classList.remove('error');
      const errorMsg = container.querySelector('.error-message');
      if (errorMsg) {
        errorMsg.remove();
      }
      const inputContainer = container.querySelector('.date-input');
      if (inputContainer) {
        inputContainer.style.borderColor = '';
      }
    });
  }
  
  // Validation and search function - Redirect to hotel_all.html
  function validateAndSearch() {
    const checkIn = checkInInput.value;
    const checkOut = checkOutInput.value;
    
    clearErrors();
    
    let isValid = true;
    
    if (!checkIn) {
      showError('checkInDate', 'Please select check-in date');
      isValid = false;
    }
    
    if (!checkOut) {
      showError('checkOutDate', 'Please select check-out date');
      isValid = false;
    }
    
    if (checkIn && checkOut && checkOut <= checkIn) {
      showError('checkOutDate', 'Check-out date must be after check-in date');
      isValid = false;
    }
    
    if (isValid) {
      function formatDisplayDate(dateString) {
        const date = new Date(dateString);
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
      }
      
      const nights = calculateNights(checkIn, checkOut);
      
      const searchParams = {
        checkIn: checkIn,
        checkOut: checkOut,
        checkInDisplay: formatDisplayDate(checkIn),
        checkOutDisplay: formatDisplayDate(checkOut),
        nights: nights
      };
      
      localStorage.setItem('searchParams', JSON.stringify(searchParams));
      
      // Check if there's a selected hotel ID from home page
      const selectedHotelId = localStorage.getItem('selectedHotelId');
      
      if (selectedHotelId) {
        // Redirect to specific hotel with dates
        // Keep selectedHotelId in localStorage so user can modify dates and search again
        window.location.href = `../hotel/hotel_all.html?id=${selectedHotelId}&checkIn=${checkIn}&checkOut=${checkOut}&nights=${nights}`;
      } else {
        // Redirect to result page to show all hotels
        localStorage.removeItem('selectedHotelId');
        window.location.href = '/html/search/result.html';
      }
    }
  }
  
  // Add real-time validation clearing
  if (checkInInput) {
    checkInInput.addEventListener('change', function() {
      const container = this.closest('.date-field');
      if (container && container.classList.contains('error')) {
        container.classList.remove('error');
        const errorMsg = container.querySelector('.error-message');
        if (errorMsg) errorMsg.remove();
        const inputContainer = container.querySelector('.date-input');
        if (inputContainer) inputContainer.style.borderColor = '';
      }
    });
  }
  
  if (checkOutInput) {
    checkOutInput.addEventListener('change', function() {
      const container = this.closest('.date-field');
      if (container && container.classList.contains('error')) {
        container.classList.remove('error');
        const errorMsg = container.querySelector('.error-message');
        if (errorMsg) errorMsg.remove();
        const inputContainer = container.querySelector('.date-input');
        if (inputContainer) inputContainer.style.borderColor = '';
      }
    });
  }
  
  // Attach search button click event
  if (searchBtn) {
    searchBtn.addEventListener('click', validateAndSearch);
  }
  
  // Make functions available globally
  window.goBackToHome = goBackToHome;
  
  // Load navigation component and initialize page
  fetch('nav.html')
    .then(response => {
      if (!response.ok) {
        throw new Error('Navigation file not found');
      }
      return response.text();
    })
    .then(html => {
      document.getElementById('nav-container').innerHTML = html;
      
      const currentPage = window.location.pathname.split('/').pop() || 'search.html';
      const navItems = document.querySelectorAll('.nav-item');
      
      navItems.forEach(item => {
        const href = item.getAttribute('href');
        if (href && (href.includes(currentPage) || href.endsWith(currentPage))) {
          item.classList.add('active');
        }
      });
      
      initializePage();
    })
    .catch(error => {
      console.error('Error loading navigation:', error);
      document.getElementById('nav-container').innerHTML = `
        <div class="bottom-nav">
          <div class="nav-buttons">
            <a href="../nav/home.html" class="nav-item">
              <i class="fas fa-home"></i>
              <span>Home</span>
            </a>
            <a href="../nav/history.html" class="nav-item">
              <i class="fas fa-clock-rotate-left"></i>
              <span>History</span>
            </a>
            <a href="../nav/profile.html" class="nav-item">
              <i class="fas fa-user-circle"></i>
              <span>Profile</span>
            </a>
            <a href="../nav/cs.html" class="nav-item">
              <i class="fas fa-headset"></i>
              <span>Service</span>
            </a>
          </div>
        </div>
      `;
      
      initializePage();
    });
</script>
</body>
</html>
