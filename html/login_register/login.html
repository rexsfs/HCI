<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>LuxeStay | Login</title>
  <!-- Font Awesome 6 (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/login_register/login.css">
  <script src="data.js"></script>
  <style>
    /* Custom Modal Popup Styles - Centered in Middle */
    .custom-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(4px);
    }
    
    .custom-modal.show {
      display: flex;
    }
    
    .modal-content {
      background: white;
      border-radius: 24px;
      max-width: 320px;
      width: 85%;
      padding: 0;
      text-align: center;
      animation: modalFadeIn 0.3s ease;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2);
    }
    
    @keyframes modalFadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    
    .modal-icon {
      font-size: 56px;
      color: #28a745;
      margin-top: 24px;
      margin-bottom: 8px;
    }
    
    .modal-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1e3a5f;
      margin-bottom: 12px;
      padding: 0 20px;
    }
    
    .modal-message {
      color: #5a6e8a;
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 20px;
      padding: 0 20px;
    }
    
    .modal-buttons {
      display: flex;
      border-top: 1px solid #eef2f6;
    }
    
    .modal-btn {
      flex: 1;
      padding: 16px;
      border: none;
      background: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      border-radius: 0;
    }
    
    .modal-btn:first-child {
      border-bottom-left-radius: 24px;
      border-right: 1px solid #eef2f6;
      color: #5a6e8a;
    }
    
    .modal-btn:last-child {
      border-bottom-right-radius: 24px;
      color: #1e3a5f;
    }
    
    .modal-btn:active {
      background: #f5f7fb;
    }
    
    .modal-btn-confirm {
      color: #28a745;
      font-weight: 700;
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- Header with Logo -->
  <div class="header">
    <div class="logo-area">
      <div class="logo-icon">
        <i class="fas fa-hotel"></i>
      </div>
      <div class="logo-text">LuxeStay</div>
    </div>
  </div>

  <!-- Login Section -->
  <div class="login-section">
    <h1 class="login-title">Login</h1>

    <!-- Phone Input -->
    <div class="form-group">
      <label class="input-label">Phone number</label>
      <input type="tel" class="phone-input" placeholder="Enter your phone number">
      <div class="error-message" id="phoneError">Please enter a valid Malaysia phone number</div>
    </div>

    <!-- Continue Button -->
    <button class="continue-btn">
      <i class="fas fa-arrow-right"></i>
      Continue
    </button>

    <!-- Divider -->
    <div class="divider">
      <span>or</span>
    </div>

    <!-- Register Big Button -->
    <button class="register-btn">
      <i class="fas fa-user-plus"></i>
      Register
    </button>

    <!-- Help & Guideline Buttons at Bottom (same style as Register button) -->
    <div class="bottom-buttons-container">
      <button class="help-btn">
        <i class="fas fa-question-circle"></i>
        Help
      </button>
      <button class="guideline-btn">
        <i class="fas fa-file-alt"></i>
        Guideline
      </button>
    </div>
  </div>
</div>

<!-- Custom Modal Popup -->
<div id="loginSuccessModal" class="custom-modal">
  <div class="modal-content">
    <div class="modal-icon">
      <i class="fas fa-check-circle"></i>
    </div>
    <div class="modal-title">Login Successful</div>
    <div class="modal-message">
      Welcome back to LuxeStay!<br>
      You have successfully logged in.
    </div>
    <div class="modal-buttons">
      <button class="modal-btn modal-btn-confirm" id="modalOkBtn">Continue</button>
    </div>
  </div>
</div>

<script>
    // Malaysia phone number validation function
    function validateMalaysiaPhone(phone) {
        // Remove all spaces, dashes, and special characters for validation
        const cleanPhone = phone.replace(/[\s\-\(\)]/g, '');
        
        // Malaysia phone number patterns:
        // 1. Starts with 01 (mobile) - 010, 011, 012, 013, 014, 015, 016, 017, 018, 019
        // 2. Total length should be 10-11 digits including the leading 0
        // 3. Alternative: +60 format (e.g., +60123456789)
        
        // Pattern for 01X format (local format)
        const localPattern = /^01[0-9]{8,9}$/;
        
        // Pattern for +60 format (international format)
        const internationalPattern = /^\+60[0-9]{9,10}$/;
        
        // Pattern for 60 format (without +)
        const intlWithoutPlus = /^60[0-9]{9,10}$/;
        
        if (localPattern.test(cleanPhone)) {
            return { valid: true, message: '' };
        }
        
        if (internationalPattern.test(cleanPhone)) {
            return { valid: true, message: '' };
        }
        
        if (intlWithoutPlus.test(cleanPhone)) {
            return { valid: true, message: '' };
        }
        
        return { 
            valid: false, 
            message: 'Please enter a valid Malaysia phone number (e.g., 0123456789 or +60123456789)' 
        };
    }
    
    // Standardize phone number format
    function standardizePhone(phone) {
        const cleanPhone = phone.replace(/[\s\-\(\)]/g, '');
        
        if (cleanPhone.match(/^01[0-9]{8,9}$/)) {
            // Convert local format to international format
            return '+6' + cleanPhone;
        } else if (cleanPhone.match(/^60[0-9]{9,10}$/)) {
            // Add + prefix
            return '+' + cleanPhone;
        }
        return phone;
    }
    
    // Function to show error message
    function showError(message) {
        const errorDiv = document.getElementById('phoneError');
        const phoneInputField = document.querySelector('.phone-input');
        errorDiv.textContent = message;
        errorDiv.classList.add('show');
        phoneInputField.classList.add('error');
    }
    
    // Function to hide error message
    function hideError() {
        const errorDiv = document.getElementById('phoneError');
        const phoneInputField = document.querySelector('.phone-input');
        errorDiv.classList.remove('show');
        phoneInputField.classList.remove('error');
    }
    
    // Login page functionality
    const continueBtn = document.querySelector('.continue-btn');
    const registerBtn = document.querySelector('.register-btn');
    const helpBtn = document.querySelector('.help-btn');
    const guidelineBtn = document.querySelector('.guideline-btn');
    const phoneInput = document.querySelector('.phone-input');
    
    // Clear error when user starts typing
    if (phoneInput) {
        phoneInput.addEventListener('input', function() {
            hideError();
        });
    }
    
    // Continue button - login or redirect to register
    if (continueBtn) {
        continueBtn.addEventListener('click', function() {
            const phone = phoneInput ? phoneInput.value.trim() : '';
            
            if (!phone) {
                showError('Please enter your phone number');
                phoneInput.focus();
                return;
            }
            
            // Validate Malaysia phone number
            const validation = validateMalaysiaPhone(phone);
            if (!validation.valid) {
                showError(validation.message);
                phoneInput.focus();
                return;
            }
            
            // Hide error if valid
            hideError();
            
            // Standardize phone format for lookup
            const standardizedPhone = standardizePhone(phone);
            
            // Check if phone exists in database
            const existingUser = UserDB.findUserByPhone(standardizedPhone);
            
            if (existingUser) {
                // User exists - login
                UserDB.setCurrentUser(existingUser);
                showLoginSuccessModal();
            } else {
                // User doesn't exist - redirect to register with phone number
                showError('Phone number not registered. Please register first.');
                setTimeout(function() {
                    window.location.href = 'register.html?phone=' + encodeURIComponent(phone);
                }, 1500);
            }
        });
    }
    
    // Register button - go to register page
    if (registerBtn) {
        registerBtn.addEventListener('click', function() {
            window.location.href = 'register.html';
        });
    }
    
    // Help button
    if (helpBtn) {
        helpBtn.addEventListener('click', function() {
            alert('Need help? Contact our customer support at support@luxestay.com or call +6012-345-6789');
        });
    }
    
    // Guideline button
    if (guidelineBtn) {
        guidelineBtn.addEventListener('click', function() {
            alert('Guidelines:\n1. Use your registered Malaysia phone number (e.g., 0123456789 or +60123456789)\n2. New users must register first\n3. Keep your profile information up to date\n4. Contact support if you face any issues');
        });
    }
    
    // Function to show login success modal
    function showLoginSuccessModal() {
        const modal = document.getElementById('loginSuccessModal');
        modal.classList.add('show');
        
        // Handle OK button
        document.getElementById('modalOkBtn').addEventListener('click', function() {
            modal.classList.remove('show');
            // Navigate to home page after modal closes
            window.location.href = '../nav/home.html';
        });
        
        // Close modal when clicking outside
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                modal.classList.remove('show');
                // Navigate to home page after modal closes
                window.location.href = '../nav/home.html';
            }
        });
    }
</script>
</body>
</html>
