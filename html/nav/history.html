<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>LuxeStay | Booking History</title>
  <!-- Font Awesome 6 (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/nav/history.css">
  <script src="../login_register/data.js"></script>
  <script src="../hotel/hotel.js"></script>
</head>
<body>
<div class="app-container">
  <!-- Header with Back Button - consistent with successful.html back button styling -->
  <div class="header">
    <div class="logo-area">
      <div class="logo-icon">
        <i class="fas fa-hotel"></i>
      </div>
      <div class="logo-text">LuxeStay</div>
    </div>
  </div>

  <!-- Booking History Section with centered title -->
  <div class="history-section">
    <!-- CENTERED Section Title for Booking History -->
    <div class="section-title">
      <span class="title-main">
        Booking History
      </span>
    </div>
    
    <!-- Dynamic Booking Container -->
    <div id="bookingContainer"></div>
    
    <!-- No Bookings Message -->
    <div id="noBookingsMessage" style="display: none; text-align: center; padding: 60px 20px; color: #666;">
      <i class="fas fa-calendar-alt" style="font-size: 64px; color: #ccc; margin-bottom: 20px; display: block;"></i>
      <h3 style="margin-bottom: 10px;">No Booking History</h3>
      <p>You haven't made any bookings yet.<br>Start your first booking by searching for hotels!</p>
    </div>
  </div>

  <div id="nav-container"></div>
</div>

<script>
  // Function to get hotel image from database
  function getHotelImage(hotelName) {
    if (typeof HOTELS_DATABASE !== 'undefined') {
      for (const id in HOTELS_DATABASE) {
        const hotel = HOTELS_DATABASE[id];
        if (hotel.name === hotelName) {
          return hotel.image;
        }
      }
    }
    // Return default image if not found
    return 'https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=600&h=400&fit=crop';
  }

  // Function to get hotel location from database
  function getHotelLocation(hotelName) {
    if (typeof HOTELS_DATABASE !== 'undefined') {
      for (const id in HOTELS_DATABASE) {
        const hotel = HOTELS_DATABASE[id];
        if (hotel.name === hotelName) {
          return hotel.location;
        }
      }
    }
    return null;
  }

  // Function to format date with time
  function formatDateWithTime(dateString, isCheckIn) {
    if (!dateString) return 'N/A';
    const date = new Date(dateString);
    const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const time = isCheckIn ? '3:00 PM' : '12:00 PM';
    return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()} (${time})`;
  }

  // Function to get status badge class
  function getStatusClass(status) {
    switch(status) {
      case 'completed':
        return 'status-completed';
      case 'confirmed':
        return 'status-confirmed';
      case 'pending':
        return 'status-pending';
      case 'cancelled':
        return 'status-cancelled';
      default:
        return 'status-pending';
    }
  }

  // Function to get status text
  function getStatusText(status) {
    switch(status) {
      case 'completed':
        return 'Completed';
      case 'confirmed':
        return 'Confirmed';
      case 'pending':
        return 'Pending Payment';
      case 'cancelled':
        return 'Cancelled';
      default:
        return status || 'Unknown';
    }
  }

  // Function to load booking history from localStorage only
  function loadBookingHistory() {
    const container = document.getElementById('bookingContainer');
    const noBookingsMessage = document.getElementById('noBookingsMessage');
    
    // Get payment history from localStorage
    let paymentHistory = localStorage.getItem('paymentHistory');
    let pendingPayments = localStorage.getItem('pendingPayments');
    let cancelledBookings = localStorage.getItem('cancelledBookings');
    
    let allBookings = [];
    
    // Add completed payments from localStorage
    if (paymentHistory) {
      const completed = JSON.parse(paymentHistory);
      completed.forEach(booking => {
        allBookings.push({
          ...booking,
          status: 'completed',
          displayStatus: 'Completed'
        });
      });
    }
    
    // Add pending payments from localStorage
    if (pendingPayments) {
      const pending = JSON.parse(pendingPayments);
      pending.forEach(booking => {
        allBookings.push({
          ...booking,
          status: 'pending',
          displayStatus: 'Pending Payment'
        });
      });
    }
    
    // Add cancelled bookings from localStorage
    if (cancelledBookings) {
      const cancelled = JSON.parse(cancelledBookings);
      cancelled.forEach(booking => {
        allBookings.push({
          ...booking,
          status: 'cancelled',
          displayStatus: 'Cancelled'
        });
      });
    }
    
    // Sort by payment date (newest first)
    allBookings.sort((a, b) => {
      const dateA = new Date(a.paymentDate || a.cancellationDate || 0);
      const dateB = new Date(b.paymentDate || b.cancellationDate || 0);
      return dateB - dateA;
    });
    
    if (allBookings.length === 0) {
      container.innerHTML = '';
      noBookingsMessage.style.display = 'block';
      return;
    }
    
    noBookingsMessage.style.display = 'none';
    
    let bookingsHTML = '';
    
    allBookings.forEach(booking => {
      // Get hotel image from database
      let hotelImage = getHotelImage(booking.hotelName);
      let hotelLocation = booking.location || booking.hotelLocation || getHotelLocation(booking.hotelName) || 'Location';
      
      const hotelName = booking.hotelName || 'Hotel Name';
      const roomType = booking.roomType || 'Room Type';
      const roomName = booking.roomName || booking.roomType || roomType;
      const checkIn = booking.checkIn;
      const checkOut = booking.checkOut;
      const totalAmount = booking.totalAmount || 'RM 0';
      const status = booking.status || 'pending';
      const statusText = getStatusText(status);
      const statusClass = getStatusClass(status);
      const bookingId = booking.bookingId;
      // For cancelled bookings, use 'cancelled' as type
      const bookingType = status === 'cancelled' ? 'cancelled' : (status === 'completed' ? 'completed' : 'pending');
      
      bookingsHTML += `
        <div class="booking-card" onclick="viewBookingDetails('${bookingId}', '${bookingType}')" style="cursor: pointer;">
          <div class="booking-image">
            <img src="${hotelImage}" alt="${hotelName}">
          </div>
          <div class="booking-details">
            <div class="booking-info">
              <div class="info-row">
                <span class="info-label">Hotel Name:</span>
                <span class="info-value">${escapeHtml(hotelName)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Location:</span>
                <span class="info-value">${escapeHtml(hotelLocation)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Room Name:</span>
                <span class="info-value">${escapeHtml(roomName)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Check-In Date:</span>
                <span class="info-value">${checkIn ? formatDateWithTime(checkIn, true) : 'N/A'}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Check-Out Date:</span>
                <span class="info-value">${checkOut ? formatDateWithTime(checkOut, false) : 'N/A'}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Total Price:</span>
                <span class="info-value">${escapeHtml(totalAmount)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Booking ID:</span>
                <span class="info-value">${escapeHtml(bookingId || 'N/A')}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Status:</span>
                <span class="info-value"><span class="status-badge ${statusClass}">${statusText}</span></span>
              </div>
            </div>
          </div>
        </div>
      `;
    });
    
    container.innerHTML = bookingsHTML;
  }
  
  // Function to view booking details
  function viewBookingDetails(bookingId, bookingType) {
    if (bookingId) {
      window.location.href = `../history/detail.html?bookingId=${bookingId}&type=${bookingType}`;
    } else {
      alert('Booking details not available');
    }
  }
  
  // Helper function to escape HTML
  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // Make viewBookingDetails available globally
  window.viewBookingDetails = viewBookingDetails;

  // Load navigation component from external file
  fetch('nav.html')
    .then(response => {
      if (!response.ok) {
        throw new Error('Navigation file not found');
      }
      return response.text();
    })
    .then(html => {
      document.getElementById('nav-container').innerHTML = html;
      
      // After loading nav, set active state
      const currentPage = window.location.pathname.split('/').pop() || 'history.html';
      const navItems = document.querySelectorAll('.nav-item');
      
      navItems.forEach(item => {
        const href = item.getAttribute('href');
        if (href && (href.includes(currentPage) || href.endsWith(currentPage))) {
          item.classList.add('active');
        }
      });
       // Clear localStorage to reset booking history for testing
      // Load booking history after navigation is loaded
      loadBookingHistory();
    })
    .catch(error => {
      console.error('Error loading navigation:', error);
      // Fallback navigation in case file doesn't load
      document.getElementById('nav-container').innerHTML = `
        <div class="bottom-nav">
          <div class="nav-buttons">
            <a href="home.html" class="nav-item">
              <i class="fas fa-home"></i>
              <span>Home</span>
            </a>
            <a href="history.html" class="nav-item">
              <i class="fas fa-clock-rotate-left"></i>
              <span>History</span>
            </a>
            <a href="profile.html" class="nav-item">
              <i class="fas fa-user-circle"></i>
              <span>Profile</span>
            </a>
            <a href="cs.html" class="nav-item">
              <i class="fas fa-headset"></i>
              <span>Service</span>
            </a>
          </div>
        </div>
      `;
      
      // Set active state for fallback
      const currentPage = window.location.pathname.split('/').pop() || 'history.html';
      const navItems = document.querySelectorAll('.nav-item');
      navItems.forEach(item => {
        const href = item.getAttribute('href');
        if (href && (href.includes(currentPage) || href.endsWith(currentPage))) {
          item.classList.add('active');
        }
      });
      
      loadBookingHistory();
    
    });
</script>
</body>
</html>
