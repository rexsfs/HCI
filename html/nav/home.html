<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>LuxeStay | Hotel Reservation System</title>
  <!-- Font Awesome 6 (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/nav/home.css">
  
  <!-- Include external hotel database -->
  <script src="../hotel/hotel.js"></script>
  
  <!-- Debug script to verify database loaded -->
  <script>
    // Check if database loaded successfully
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof HOTELS_DATABASE === 'undefined') {
        console.error('ERROR: HOTELS_DATABASE not loaded!');
        console.log('Make sure hotels.js is in the correct location');
      } else {
        console.log('SUCCESS: Database loaded with ' + Object.keys(HOTELS_DATABASE).length + ' hotels');
      }
    });
  </script>
</head>
<body>
<div class="app-container">
  <!-- Header: Logo only -->
  <div class="header">
    <div class="logo-area">
      <div class="logo-icon">
        <i class="fas fa-hotel"></i>
      </div>
      <div class="logo-text">LuxeStay</div>
    </div>
  </div>

  <!-- Search Section -->
  <div class="search-section">
    <a href="../search/search.html">
      <button class="search-button" id="searchBtn">
        <i class="fas fa-search"></i>
        <span>Search Your Destination</span>
      </button>
    </a>
  </div>

  <!-- Hotel List: All Hotels -->
  <div class="hotel-list" id="hotelListContainer"></div>

  <!-- Navigation Container - will be loaded from nav.html -->
  <div id="nav-container"></div>
</div>

<script>
  // =====================================================
  // Convert HOTELS_DATABASE to ALL_HOTELS array format for display
  // =====================================================
  function convertToAllHotels() {
    const allHotels = [];
    
    for (const id in HOTELS_DATABASE) {
      const hotel = HOTELS_DATABASE[id];
      allHotels.push({
        id: hotel.id,
        name: hotel.name,
        rating: hotel.rating,
        reviewCount: hotel.reviewCount,
        location: hotel.location,
        amenities: hotel.amenities,
        price: hotel.rooms[0]?.price || 0,
        image: hotel.image,
        rooms: hotel.rooms
      });
    }
    
    return allHotels;
  }

  // =====================================================
  // FUNCTION: Render all hotels
  // =====================================================
  function renderAllHotels() {
    const container = document.getElementById('hotelListContainer');
    
    if (!container) return;
    
    // Check if database is loaded
    if (typeof HOTELS_DATABASE === 'undefined') {
      console.error('HOTELS_DATABASE not loaded!');
      container.innerHTML = `
        <div style="text-align: center; padding: 60px 20px; color: #666;">
          <i class="fas fa-database" style="font-size: 64px; color: #e74c3c; margin-bottom: 20px; display: block;"></i>
          <h3 style="margin-bottom: 10px;">Database Error</h3>
          <p>Failed to load hotel database.<br>Please check if hotels.js is in the correct location.</p>
        </div>
      `;
      return;
    }
    
    const ALL_HOTELS = convertToAllHotels();
    
    let hotelsHTML = '';
    
    ALL_HOTELS.forEach(hotel => {
      // Generate amenities HTML with icons
      let amenitiesHTML = '';
      hotel.amenities.forEach(amenity => {
        let icon = 'fa-hotel';
        if (amenity.includes('Pool')) icon = 'fa-swimming-pool';
        else if (amenity.includes('WiFi')) icon = 'fa-wifi';
        else if (amenity.includes('Restaurant') || amenity.includes('Dining')) icon = 'fa-utensils';
        else if (amenity.includes('Bar')) icon = 'fa-cocktail';
        else if (amenity.includes('Service')) icon = 'fa-concierge-bell';
        else if (amenity.includes('Spa')) icon = 'fa-spa';
        else if (amenity.includes('Fitness')) icon = 'fa-dumbbell';
        else if (amenity.includes('Beach')) icon = 'fa-umbrella-beach';
        else if (amenity.includes('View')) icon = 'fa-leaf';
        else if (amenity.includes('Climate')) icon = 'fa-snowflake';
        else if (amenity.includes('Golf')) icon = 'fa-golf-ball';
        else if (amenity.includes('Kids')) icon = 'fa-child';
        else if (amenity.includes('Heritage')) icon = 'fa-landmark';
        else if (amenity.includes('Ocean')) icon = 'fa-water';
        
        amenitiesHTML += `<span><i class="fas ${icon}"></i> ${amenity}</span>`;
      });
      
      hotelsHTML += `
        <div class="hotel-card" onclick="window.location.href='../hotel/hotel_all.html?id=${hotel.id}'">
          <div class="hotel-image">
            <img src="${hotel.image}" alt="${hotel.name}">
          </div>
          <div class="hotel-info">
            <div class="hotel-name">
              ${hotel.name}
              <span>⭐ ${hotel.rating}</span>
            </div>
            <div class="hotel-details">
              <span><i class="fas fa-map-marker-alt"></i> ${hotel.location}</span>
              ${amenitiesHTML}
            </div>
            <div class="price">
              RM ${hotel.price} <small>/ night</small>
            </div>
          </div>
        </div>
      `;
    });
    
    container.innerHTML = hotelsHTML;
  }

  // =====================================================
  // FUNCTION: Load navigation and initialize page
  // =====================================================
  function initializePage() {
    renderAllHotels();
    
    // Load navigation component from external file
    fetch('nav.html')
      .then(response => {
        if (!response.ok) {
          throw new Error('Navigation file not found');
        }
        return response.text();
      })
      .then(html => {
        document.getElementById('nav-container').innerHTML = html;
        
        // After loading nav, set active state
        const currentPage = window.location.pathname.split('/').pop() || 'home.html';
        const navItems = document.querySelectorAll('.nav-item');
        
        navItems.forEach(item => {
          const href = item.getAttribute('href');
          if (href && (href.includes(currentPage) || href.endsWith(currentPage))) {
            item.classList.add('active');
          }
        });
      })
      .catch(error => {
        console.error('Error loading navigation:', error);
        // Fallback navigation
        document.getElementById('nav-container').innerHTML = `
          <div class="bottom-nav">
            <div class="nav-buttons">
              <a href="home.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Home</span>
              </a>
              <a href="history.html" class="nav-item">
                <i class="fas fa-clock-rotate-left"></i>
                <span>History</span>
              </a>
              <a href="profile.html" class="nav-item">
                <i class="fas fa-user-circle"></i>
                <span>Profile</span>
              </a>
              <a href="cs.html" class="nav-item">
                <i class="fas fa-headset"></i>
                <span>Service</span>
              </a>
            </div>
          </div>
        `;
        
        // Set active state for fallback
        const currentPage = window.location.pathname.split('/').pop() || 'home.html';
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
          const href = item.getAttribute('href');
          if (href && (href.includes(currentPage) || href.endsWith(currentPage))) {
            item.classList.add('active');
          }
        });
      });
  }

  // Initialize the page when DOM is ready
  document.addEventListener('DOMContentLoaded', initializePage);
</script>
</body>
</html>
